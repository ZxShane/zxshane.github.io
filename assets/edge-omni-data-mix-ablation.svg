<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="640" viewBox="0 0 1160 640" role="img" aria-labelledby="title desc">
  <title id="title">端侧 Omni 模型的数据配比消融实验</title>
  <desc id="desc">在 Text、Image、Audio 数据配比实验中，2 比 1 比 1 的 CIDEr 为 0.211，是全部实验中的最高结果。</desc>
  <rect width="1160" height="640" fill="#ffffff"/>
  <style>
    text { font-family: Inter, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #17212b; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 17px; fill: #66737f; }
    .axis { font-size: 13px; fill: #66737f; }
    .label { font-size: 14px; font-weight: 600; }
    .value { font-size: 13px; font-weight: 700; }
    .grid { stroke: #e8edf1; stroke-width: 1; }
  </style>

  <text class="title" x="58" y="58">2:1:1 数据配比取得最佳 Caption 效果</text>
  <text class="subtitle" x="58" y="90">Text : Image : Audio · ShareGPT4V 长 Caption · CIDEr ↑</text>
  <line x1="58" y1="112" x2="1102" y2="112" stroke="#dfe5ea" stroke-width="2"/>

  <line class="grid" x1="82" y1="160" x2="1090" y2="160"/><line class="grid" x1="82" y1="245" x2="1090" y2="245"/><line class="grid" x1="82" y1="330" x2="1090" y2="330"/><line class="grid" x1="82" y1="415" x2="1090" y2="415"/><line x1="82" y1="500" x2="1090" y2="500" stroke="#bdc7cf" stroke-width="1.5"/>
  <text class="axis" x="42" y="165">0.24</text><text class="axis" x="42" y="250">0.18</text><text class="axis" x="42" y="335">0.12</text><text class="axis" x="42" y="420">0.06</text><text class="axis" x="55" y="505">0</text>

  <rect x="95" y="484" width="50" height="16" rx="3" fill="#b8c2ca"/><text class="value" x="103" y="476">.011</text><text class="axis" x="94" y="527">Stage2.2</text>
  <rect x="173" y="404" width="50" height="96" rx="3" fill="#8aa9c2"/><text class="value" x="181" y="396">.068</text><text class="axis" x="177" y="527">仅文本</text>
  <rect x="251" y="251" width="50" height="249" rx="3" fill="#4f87b5"/><text class="value" x="259" y="243">.176</text><text class="label" x="258" y="527">1:1:1</text>
  <rect x="329" y="201" width="50" height="299" rx="3" fill="#d7862f"/><text class="value" x="337" y="193">.211</text><text class="label" x="336" y="527">2:1:1</text>
  <path d="M354 174 l7 12 h-14 z" fill="#d7862f"/><text class="label" x="324" y="158">最佳</text>
  <rect x="407" y="269" width="50" height="231" rx="3" fill="#4f87b5"/><text class="value" x="415" y="261">.163</text><text class="label" x="414" y="527">5:1:1</text>
  <rect x="485" y="266" width="50" height="234" rx="3" fill="#4f87b5"/><text class="value" x="493" y="258">.165</text><text class="label" x="492" y="527">2:2:1</text>
  <rect x="563" y="303" width="50" height="197" rx="3" fill="#4f87b5"/><text class="value" x="571" y="295">.139</text><text class="label" x="570" y="527">2:1:2</text>
  <rect x="641" y="307" width="50" height="193" rx="3" fill="#4f87b5"/><text class="value" x="649" y="299">.136</text><text class="label" x="648" y="527">1:1:2</text>
  <rect x="719" y="327" width="50" height="173" rx="3" fill="#4f87b5"/><text class="value" x="727" y="319">.122</text><text class="label" x="726" y="527">1:2:1</text>
  <rect x="797" y="283" width="50" height="217" rx="3" fill="#4f87b5"/><text class="value" x="805" y="275">.153</text><text class="label" x="804" y="527">1:1:5</text>
  <rect x="875" y="262" width="50" height="238" rx="3" fill="#4f87b5"/><text class="value" x="883" y="254">.168</text><text class="label" x="882" y="527">1:5:1</text>
  <rect x="953" y="224" width="50" height="276" rx="3" fill="#4f87b5"/><text class="value" x="961" y="216">.195</text><text class="label" x="960" y="527">1:5:3</text>
  <rect x="1031" y="275" width="50" height="225" rx="3" fill="#4f87b5"/><text class="value" x="1039" y="267">.159</text><text class="label" x="1038" y="527">1:3:5</text>

  <rect x="58" y="558" width="1044" height="48" rx="8" fill="#f4f7fa"/>
  <text class="subtitle" x="82" y="589">在全部 13 组实验中，2:1:1 的 CIDEr 最高；继续增加文本或让音频数据超过图像数据均未带来进一步收益。</text>
</svg>
